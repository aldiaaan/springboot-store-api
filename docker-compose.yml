services:
  db:
    image: postgres:17-alpine
    container_name: store-db
    restart: always
    environment:
      POSTGRES_DB: store
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d store"]
      interval: 7s
      timeout: 10s
      retries: 10
      start_period: 15s
    volumes:
      - .tmp/postgres-production:/var/lib/postgresql/data
  app:
    build: .
    container_name: store-api
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/store
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - SHOW_SQL=true
    depends_on:
      db:
        condition: service_healthy