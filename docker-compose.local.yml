services:
  db:
    image: postgres:17-alpine
    container_name: store-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: store
    volumes:
      - .tmp/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d store"]
      interval: 5s
      timeout: 5s
      retries: 5